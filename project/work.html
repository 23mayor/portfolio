<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work</title>
    <link rel="stylesheet" href="css/NormalizeCSS.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar__photo"></div>
            <h3 class="sidebar__header">Artem Pchelyakov</h3>
            <h3 class="sidebar__header">senior product designer</h3>
            <nav class="sidebar__nav">
                <ul class="sidebar__list">
                    <li class="sidebar__item">
                        <a href="#" class="sidebar__link">Works</a>
                    </li>
                    <span class="sidebar__stripe">/</span>
                    <li class="sidebar__item">
                        <a href="#" class="sidebar__link active">About</a>
                    </li>
                    <span class="sidebar__stripe">/</span>
                    <li class="sidebar__item">
                        <a href="#" class="sidebar__link">Contact</a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar__extra-links">
                <div class="sidebar__item">
                    <a href="#" class="sidebar__link">Inspiration</a>
                </div>
                <span class="sidebar__stripe">/</span>
                <div class="sidebar__item">
                    <a href="#" class="sidebar__link">Shoutout</a>
                </div>
            </div>
        </div>
        <div class="work-container">

        </div>
        
    </div>
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer__left">
                    <h2 class="footer__header">Stay in the loop with new articles, projects<span class="footer__notice">with no ads</span></h2>
                <form action="https://jsonplaceholder.typicode.com/posts">
                    <input type="email" class="footer__input">
                    <span class="footer__send-btn">
                        <button type="submit" class="footer__send-arrow">
                          <span><img src="img/footer-input-arrow.svg" alt="Send" class="input__btn"></span>
                        </button>
                      </span>
                </form>
                <div class="footer__dev-box">
                    <span class="footer__dev">© 2021 Artem Pchelyakov</span>
                    <span class="footer__dev">•</span>
                    <span class="footer__dev">Developted by Andrey Mayorov</span>
                    <a href="#" class="footer__dev-link">
                        <img src="img/dev-arrow.svg" alt="Link" class="link__img">
                    </a>
                </div>
            </div>
            <div class="footer__right">
                <ul class="footer__list">
                    <li class="footer__item">
                        <a href="#" class="footer__item">Facebook<img src="img/footer-link-arrow.svg" alt="Link" class="link__img"></a>
                    </li>
                    <li class="footer__item">
                        <a href="#" class="footer__item">Twitter<img src="img/footer-link-arrow.svg" alt="Link" class="link__img"></a>
                    </li>
                    <li class="footer__item">
                        <a href="#" class="footer__item">Instagram<img src="img/footer-link-arrow.svg" alt="Link" class="link__img"></a>
                    </li>
                    <li class="footer__item">
                        <a href="#" class="footer__item">Savee<img src="img/footer-link-arrow.svg" alt="Link" class="link__img"></a>
                    </li>
                    <li class="footer__item">
                        <a href="#" class="footer__item">Spotify Playlist<img src="img/footer-link-arrow.svg" alt="Link" class="link__img"></a>
                    </li>
                </ul>
            </div>
        </div>
    </footer>
